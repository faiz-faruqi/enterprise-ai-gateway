name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install ruff==0.4.4

      - name: Run Ruff lint
        run: ruff check src/ scripts/

      - name: Run Ruff format check
        run: ruff format --check src/ scripts/

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('src/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r src/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short -x
        env:
          # Vector store — use qdrant config; unit tests mock all I/O anyway
          VECTOR_STORE: qdrant
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          # Redis — real service container available in CI
          REDIS_URL: ""
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          # Inference — all mocked in unit tests; keys are required by client init
          OLLAMA_BASE_URL: http://localhost:11434
          OPENROUTER_API_KEY: ci-test-key
          OPENROUTER_MODEL: openai/gpt-4o-mini
          # Application
          LOG_LEVEL: warning
          DEMO_MODE: "false"
          ADMIN_KEY: ci-test-admin-key

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t local-first-hybrid-ai:ci .

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Next.js app
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: ".markdownlint.json"
        continue-on-error: true
